version: '3.3'

services:
  db:
    build:
      context: .
      dockerfile: ./Dockerfile.db
    container_name: lock_db
    hostname: lock-db
    restart: always
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASS}
    volumes:
      - ./db:/var/lib/mysql
    healthcheck:
      # Swapped to standard mysql tool so it pings natively inside your ARMv6 Debian build
      test: ["CMD", "mysql", "-u", "root", "-p${DB_ROOT_PASS}", "-e", "SELECT 1;"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      lock_network:
        aliases:
          - lock-db

  redis:
    build:
      context: .
      dockerfile: ./Dockerfile.redis
    container_name: lock_redis
    hostname: lock-redis
    restart: always
    networks:
      lock_network:
        aliases:
          - lock-redis

  unlock_server:
    build:
      context: .
      dockerfile: ./Dockerfile.unlock_server
    container_name: lock_unlock_server
    hostname: lock-unlock-server
    restart: always
    depends_on:
      - redis
      - db
    environment:
      - DEBUG=${DEBUG}
      - REDIS_HOST=lock-redis
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    devices:
      - "/dev/gpiomem:/dev/gpiomem"
      - "/dev/mem:/dev/mem"
    privileged: true
    networks:
      - lock_network

  rfid_server:
    build:
      context: .
      dockerfile: ./Dockerfile.rfid_server
    container_name: lock_rfid_server
    hostname: lock-rfid-server
    restart: always
    depends_on:
      - redis
      - unlock_server
      - db
    environment:
      - DEBUG=${DEBUG}
      - REDIS_HOST=lock-redis
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    privileged: true
    networks:
      - lock_network

  button_server:
    build:
      context: .
      dockerfile: ./Dockerfile.button_server
    container_name: lock_button_server
    hostname: lock-button-server
    restart: always
    depends_on:
      - redis
      - unlock_server
      - db
    environment:
      - DEBUG=${DEBUG}
      - REDIS_HOST=lock-redis
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    devices:
      - "/dev/gpiomem:/dev/gpiomem"
      - "/dev/mem:/dev/mem"
    privileged: true
    networks:
      - lock_network

networks:
  lock_network:
    driver: bridge
