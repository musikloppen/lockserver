version: '3.3'

services:
  setup_config:
    image: busybox
    container_name: setup_config
    volumes:
      - ./db/conf.d:/out
    command: >
      sh -c "
        mkdir -p /out &&
        echo '[client]' > /out/99-client.cnf &&
        echo 'user=${DB_USER}' >> /out/99-client.cnf &&
        echo 'password=${DB_PASS}' >> /out/99-client.cnf &&
        echo 'host=${DB_HOST}' >> /out/99-client.cnf &&
        echo 'database=${DB_NAME}' >> /out/99-client.cnf &&
        echo 'port=${DB_PORT}' >> /out/99-client.cnf
      "
    environment:
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}

  db:
    build:
      context: .
      dockerfile: ./Dockerfile.db
    container_name: lock_db
    hostname: lock-db
    restart: always
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASS}
    volumes:
      - ./db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "sh", "-c", "mysql -u root -p\"$$MARIADB_ROOT_PASSWORD\" -e \"SELECT 1;\""]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      lock_network:
        aliases:
          - lock-db
    logging:
      driver: "syslog"
      options:
        tag: "docker/db"

  redis:
    build:
      context: .
      dockerfile: ./Dockerfile.redis
    container_name: lock_redis
    hostname: lock-redis
    restart: always
    networks:
      lock_network:
        aliases:
          - lock-redis
    logging:
      driver: "syslog"
      options:
        tag: "docker/redis"

  unlock_server:
    build:
      context: .
      dockerfile: ./Dockerfile.unlock_server
    container_name: lock_unlock_server
    hostname: lock-unlock-server
    restart: always
    depends_on:
      - redis
      - db
    volumes:
      - ./db/conf.d/99-client.cnf:/etc/mysql/my.cnf:ro
    environment:
      - DEBUG=${DEBUG}
      - REDIS_HOST=lock-redis
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    devices:
      - "/dev/gpiomem:/dev/gpiomem"
      - "/dev/mem:/dev/mem"
    privileged: true
    networks:
      - lock_network
    logging:
      driver: "syslog"
      options:
        tag: "docker/unlock_server"

  rfid_server:
    build:
      context: .
      dockerfile: ./Dockerfile.rfid_server
    container_name: lock_rfid_server
    hostname: lock-rfid-server
    restart: always
    depends_on:
      - redis
      - unlock_server
      - db
    volumes:
      - ./db/conf.d/99-client.cnf:/etc/mysql/my.cnf:ro
    environment:
      - DEBUG=${DEBUG}
      - REDIS_HOST=lock-redis
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    privileged: true
    networks:
      - lock_network
    logging:
      driver: "syslog"
      options:
        tag: "docker/rfid_server"

  button_server:
    build:
      context: .
      dockerfile: ./Dockerfile.button_server
    container_name: lock_button_server
    hostname: lock-button-server
    restart: always
    depends_on:
      - redis
      - unlock_server
      - db
    volumes:
      - ./db/conf.d/99-client.cnf:/etc/mysql/my.cnf:ro
    environment:
      - DEBUG=${DEBUG}
      - REDIS_HOST=lock-redis
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    devices:
      - "/dev/gpiomem:/dev/gpiomem"
      - "/dev/mem:/dev/mem"
    privileged: true
    networks:
      - lock_network
    logging:
      driver: "syslog"
      options:
        tag: "docker/button_server"

  web:
    build:
      context: .
      dockerfile: ./Dockerfile.web
    container_name: lock_web
    hostname: lock-web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - redis
      - unlock_server
      - db
    volumes:
      - ./db/conf.d/99-client.cnf:/etc/mysql/my.cnf:ro
    environment:
      - DEBUG=${DEBUG}
      - REDIS_HOST=lock-redis
      - NOTIFICATION_SMS_CODE_MESSAGE=${NOTIFICATION_SMS_CODE_MESSAGE}
    networks:
      - lock_network
    logging:
      driver: "syslog"
      options:
        tag: "docker/web"

networks:
  lock_network:
    driver: bridge
