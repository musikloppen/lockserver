version: '3.3'

services:
  db:
    image: tobi312/rpi-mariadb:10.6-alpine
    container_name: lock_db
    hostname: lock-db
    restart: always
    ports:
      - "3307:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASS}
    volumes:
      - ./db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS}"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - lock_network

  redis:
    image: redis:alpine
    container_name: lock_redis
    hostname: lock-redis
    restart: always
    networks:
      - lock_network

  unlock_server:
    build:
      context: .
      dockerfile: ./Dockerfile.unlock_server
    container_name: lock_unlock_server
    hostname: lock-unlock-server
    restart: always
    # Flattened format to allow compatibility with the Pi's native compose engine
    depends_on:
      - redis
      - db
    environment:
      - DEBUG=${DEBUG}
      - REDIS_HOST=lock-redis
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    devices:
      - "/dev/gpiomem:/dev/gpiomem"
      - "/dev/mem:/dev/mem"
    privileged: true
    networks:
      - lock_network

  rfid_server:
    build:
      context: .
      dockerfile: ./Dockerfile.rfid_server
    container_name: lock_rfid_server
    hostname: lock-rfid-server
    restart: always
    # Flattened format to allow compatibility with the Pi's native compose engine
    depends_on:
      - redis
      - unlock_server
      - db
    environment:
      - DEBUG=${DEBUG}
      - REDIS_HOST=lock-redis
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    privileged: true
    networks:
      - lock_network

  button_server:
    build:
      context: .
      dockerfile: ./Dockerfile.button_server
    container_name: lock_button_server
    hostname: lock-button-server
    restart: always
    # Flattened format to allow compatibility with the Pi's native compose engine
    depends_on:
      - redis
      - unlock_server
      - db
    environment:
      - DEBUG=${DEBUG}
      - REDIS_HOST=lock-redis
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    devices:
      - "/dev/gpiomem:/dev/gpiomem"
      - "/dev/mem:/dev/mem"
    privileged: true
    networks:
      - lock_network

networks:
  lock_network:
    driver: bridge
