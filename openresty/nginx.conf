load_module /usr/lib/nginx/modules/ndk_http_module.so;
load_module /usr/lib/nginx/modules/ngx_http_lua_module.so;

worker_processes 1;
error_log /dev/stderr info;

events {
	worker_connections 256;
}

http {
	access_log /dev/stderr;

	lua_shared_dict rate_limit_store 2m;
	lua_shared_dict dnsbl_cache 2m;

	set_real_ip_from 172.16.0.0/12;
	set_real_ip_from 10.0.0.0/8;
	real_ip_header X-Forwarded-For;
	real_ip_recursive on;

	# Define upstream with connection keepalive pooling
	upstream backend_web {
		server web:80;
		keepalive 8; # Reuses up to 8 persistent connections to Apache
	}

	server {
		listen 80;
		server_name _;

		# Access control + Proxy
		location / {
			access_by_lua_file /usr/local/openresty/lualib/access_control.lua;

			# Proxy to upstream group
			proxy_pass http://backend_web;
			proxy_http_version 1.1;
			proxy_set_header Connection ""; # Required for HTTP keepalive reuse

			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

			proxy_intercept_errors on;

			# Intercept 502, 504 and 403 and serve custom pages
			error_page 502 504 /backend_down.html;
			error_page 403 /blocked_ip.html;

			# Timeouts
			proxy_connect_timeout 5s;
			proxy_send_timeout 30s;
			proxy_read_timeout 30s;
		}

		# Serve the custom 502 page
		location = /backend_down.html {
			internal;
			root /usr/local/openresty/html;
		}

		# Serve the custom 403 page
		location = /blocked_ip.html {
			internal;
			root /usr/local/openresty/html;
		}
	}
}
