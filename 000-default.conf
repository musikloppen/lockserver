<VirtualHost *:80>
	ServerName default
	ServerAlias *

	AddDefaultCharset UTF-8

	ServerAdmin webmaster@localhost
	DocumentRoot /var/www/lock_server

	DirectoryIndex index.epl index.html

	ErrorDocument 404 /404.html
	ErrorDocument 500 /500.epl
	ErrorDocument 503 /503.html

	PerlRequire /etc/apache2/perl/startup.pl

	SetEnvIf X-Forwarded-Proto https HTTPS=on
	RequestHeader set X-Forwarded-Proto "https"

	# Global access controller wrapper
	<Location />
		SetHandler perl-script

		PerlSetVar DefaultPath      '/'
		PerlSetVar LoginPath        '/private/login.html'
		PerlSetVar LoggedOutPath    '/logged_out.html'
		PerlSetVar SMSCodePath      '/private/sms_code.html'
		PerlSetVar PublicAccess     '/logged_out.html, /404.html, /favicon.ico'

		PerlAccessHandler LockServer::SMSAuth

		Header set Cache-Control "no-store, no-cache, must-revalidate, max-age=0"
		Header set Pragma "no-cache"
		Header set Expires "0"
	</Location>

	# Web API endpoint to trigger physical lock access
	<Location /api/unlock>
		SetHandler perl-script
		PerlResponseHandler LockServer::APIUnlock
		SetOutputFilter DEFLATE
	</Location>

	# Block public browser visibility over the outbound messaging queue folder
	<Location /sms_spool>
		Order allow,deny
		Deny from all
	</Location>

	PassEnv REDIS_HOST

	PassEnv DB_HOST
	PassEnv DB_PORT
	PassEnv DB_NAME
	PassEnv DB_USER
	PassEnv DB_PASS

	PassEnv NOTIFICATION_SMS_CODE_MESSAGE

	PassEnv SMTP_HOST
	PassEnv SMTP_PORT
	PassEnv SMTP_USER
	PassEnv SMTP_PASSWORD

	PassEnv DEBUG

	PerlSetEnv EMBPERL_DEBUG 0
	PerlSetEnv EMBPERL_ESCMODE 0
	PerlSetEnv EMBPERL_OPTIONS 262144
</VirtualHost>
