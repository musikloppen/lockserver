<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Lock Server - Logs</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			background-color: #f4f4f4;
			color: #333;
			margin: 20px;
		}

		h1 {
			font-size: 20px;
			margin-bottom: 15px;
		}

		.toolbar {
			margin-bottom: 15px;
			display: flex;
			align-items: center;
			gap: 12px;
		}

		input[type="text"] {
			padding: 5px;
			font-size: 14px;
			width: 250px;
		}

		label {
			font-size: 13px;
			cursor: pointer;
			user-select: none;
			display: flex;
			align-items: center;
			gap: 5px;
		}

		button {
			padding: 5px 10px;
			font-size: 14px;
			cursor: pointer;
		}

		.auto-refresh-status {
			font-size: 12px;
			color: #666;
			margin-left: auto;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			background: #fff;
			border: 1px solid #ccc;
		}

		th, td {
			padding: 8px 10px;
			border: 1px solid #ccc;
			text-align: left;
			font-size: 13px;
		}

		th {
			background: #eee;
		}
	</style>
</head>
<body>

	<h1>Activity & Auth Logs</h1>

	<div class="toolbar">
		<input type="text" id="searchInput" placeholder="Search phone, user, rfid, ip..." onkeyup="if(event.key==='Enter') fetchLogs()">
		<label>
			<input type="checkbox" id="hideUnverifiedCheckbox" checked onchange="fetchLogs()">
			Hide failed/unverified login attempts
		</label>
		<button onclick="fetchLogs()">Search</button>
		<button onclick="fetchLogs()">Refresh</button>
		<span class="auto-refresh-status" id="refreshStatus">Auto-refresh: 60s</span>
	</div>

	<table>
		<thead>
			<tr>
				<th>Timestamp</th>
				<th>User / Phone</th>
				<th>RFID</th>
				<th>Action / State</th>
				<th>Source / Host</th>
			</tr>
		</thead>
		<tbody id="logTableBody">
			<tr>
				<td colspan="5">Loading logs...</td>
			</tr>
		</tbody>
	</table>

	<script>
		var autoRefreshInterval = null;
		var countdown = 60;

		function fetchLogs() {
			var query = document.getElementById('searchInput').value.trim();
			var hideUnverified = document.getElementById('hideUnverifiedCheckbox').checked ? 1 : 0;
			var tbody = document.getElementById('logTableBody');

			// Construct API URL
			var url = '/api/log?q=' + encodeURIComponent(query) + '&hide_unverified=' + hideUnverified;

			fetch(url)
				.then(function(res) {
					if (!res.ok) throw new Error('Error loading logs');
					return res.json();
				})
				.then(function(result) {
					resetTimer();

					if (!result.data || result.data.length === 0) {
						tbody.innerHTML = '<tr><td colspan="5">No logs found.</td></tr>';
						return;
					}

					var html = '';
					for (var i = 0; i < result.data.length; i++) {
						var row = result.data[i];

						html += '<tr>' +
							'<td>' + escapeHtml(row.time_stamp || '') + '</td>' +
							'<td>' + escapeHtml(row.user || '-') + '</td>' +
							'<td>' + escapeHtml(row.rfid || '-') + '</td>' +
							'<td>' + escapeHtml(row.action || '-') + '</td>' +
							'<td>' + escapeHtml(row.source || '-') + '</td>' +
							'</tr>';
					}
					tbody.innerHTML = html;
				})
				.catch(function(err) {
					tbody.innerHTML = '<tr><td colspan="5" style="color: red;">' + err.message + '</td></tr>';
				});
		}

		function resetTimer() {
			countdown = 60;
			updateTimerDisplay();
		}

		function updateTimerDisplay() {
			var statusEl = document.getElementById('refreshStatus');
			if (statusEl) {
				statusEl.textContent = 'Auto-refresh: ' + countdown + 's';
			}
		}

		function escapeHtml(str) {
			return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
		}

		// Initial load
		fetchLogs();

		// Auto-refresh countdown interval (triggers fetch every 60s)
		setInterval(function() {
			countdown--;
			if (countdown <= 0) {
				fetchLogs();
			} else {
				updateTimerDisplay();
			}
		}, 1000);
	</script>

</body>
</html>
