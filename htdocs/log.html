<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Lock Server - Activity Audit Logs</title>
	<style>
		:root {
			--bg-color: #0f172a;
			--card-bg: #1e293b;
			--text: #f8fafc;
			--text-muted: #94a3b8;
			--border: #334155;
			--success: #22c55e;
			--danger: #ef4444;
			--accent: #3b82f6;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			background-color: var(--bg-color);
			color: var(--text);
			margin: 0;
			padding: 20px;
		}

		.container {
			max-width: 1000px;
			margin: 0 auto;
		}

		header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 20px;
			flex-wrap: wrap;
			gap: 10px;
		}

		h1 { margin: 0; font-size: 1.5rem; }

		.controls {
			display: flex;
			gap: 10px;
			width: 100%;
			max-width: 400px;
		}

		input[type="text"] {
			flex-grow: 1;
			padding: 8px 12px;
			background: var(--card-bg);
			border: 1px solid var(--border);
			border-radius: 6px;
			color: var(--text);
			font-size: 0.9rem;
		}

		.btn {
			padding: 8px 16px;
			background: var(--accent);
			border: none;
			border-radius: 6px;
			color: white;
			cursor: pointer;
			font-weight: bold;
		}

		.table-container {
			background: var(--card-bg);
			border-radius: 8px;
			border: 1px solid var(--border);
			overflow-x: auto;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			text-align: left;
			font-size: 0.9rem;
		}

		th, td {
			padding: 12px 16px;
			border-bottom: 1px solid var(--border);
		}

		th {
			background: #111827;
			color: var(--text-muted);
			font-weight: 600;
			text-transform: uppercase;
			font-size: 0.75rem;
			letter-spacing: 0.05em;
		}

		tr:last-child td { border-bottom: none; }

		.badge {
			display: inline-block;
			padding: 2px 8px;
			border-radius: 12px;
			font-size: 0.75rem;
			font-weight: 600;
			text-transform: uppercase;
		}

		.badge-success { background: rgba(34, 197, 94, 0.2); color: var(--success); }
		.badge-error   { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

		.timestamp { color: var(--text-muted); font-family: monospace; }
		.user { font-weight: 600; }
	</style>
</head>
<body>

<div class="container">
	<header>
		<h1>🔐 Unlock Activity Logs</h1>
		<div class="controls">
			<input type="text" id="searchInput" placeholder="Search user, event, message...">
			<button class="btn" onclick="fetchLogs()">Refresh</button>
		</div>
	</header>

	<div class="table-container">
		<table>
			<thead>
				<tr>
					<th>Timestamp</th>
					<th>User</th>
					<th>Source Event</th>
					<th>Status</th>
					<th>Details</th>
				</tr>
			</thead>
			<tbody id="logTableBody">
				<tr>
					<td colspan="5" style="text-align: center; color: var(--text-muted);">Loading audit records...</td>
				</tr>
			</tbody>
		</table>
	</div>
</div>

<script>
	async function fetchLogs() {
		const query = encodeURIComponent(document.getElementById('searchInput').value.trim());
		const tbody = document.getElementById('logTableBody');

		try {
			const res = await fetch(`/api/log?q=${query}`);
			if (!res.ok) throw new Error('Failed to load logs');

			const result = await res.json();

			if (!result.data || result.data.length === 0) {
				tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted);">No logs found.</td></tr>`;
				return;
			}

			tbody.innerHTML = result.data.map(row => `
				<tr>
					<td class="timestamp">${new Date(row.timestamp).toLocaleString()}</td>
					<td class="user">${escapeHtml(row.user || 'System')}</td>
					<td><code>${escapeHtml(row.event_type || '-')}</code></td>
					<td>
						<span class="badge ${row.status === 'ok' || row.status === 'success' ? 'badge-success' : 'badge-error'}">
							${escapeHtml(row.status || 'unknown')}
						</span>
					</td>
					<td>${escapeHtml(row.message || '')}</td>
				</tr>
			`).join('');

		} catch (err) {
			tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--danger);">${err.message}</td></tr>`;
		}
	}

	function escapeHtml(str) {
		return str.replace(/[&<>"']/g, m => ({
			'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
		}[m]));
	}

	setInterval(fetchLogs, 10000);
	fetchLogs();
</script>

</body>
</html>
