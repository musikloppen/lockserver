<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Lock Server - Logs</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			background-color: #f4f4f4;
			color: #333;
			margin: 20px;
		}

		h1 {
			font-size: 20px;
			margin-bottom: 15px;
		}

		.toolbar {
			margin-bottom: 15px;
		}

		input[type="text"] {
			padding: 5px;
			font-size: 14px;
			width: 250px;
		}

		button {
			padding: 5px 10px;
			font-size: 14px;
			cursor: pointer;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			background: #fff;
			border: 1px solid #ccc;
		}

		th, td {
			padding: 8px 10px;
			border: 1px solid #ccc;
			text-align: left;
			font-size: 13px;
		}

		th {
			background: #eee;
		}
	</style>
</head>
<body>

	<h1>Activity Logs</h1>

	<div class="toolbar">
		<input type="text" id="searchInput" placeholder="Search user, rfid, action, source...">
		<button onclick="fetchLogs()">Search</button>
		<button onclick="fetchLogs()">Refresh</button>
	</div>

	<table>
		<thead>
			<tr>
				<th>Timestamp</th>
				<th>User</th>
				<th>RFID</th>
				<th>Action</th>
				<th>Source</th>
			</tr>
		</thead>
		<tbody id="logTableBody">
			<tr>
				<td colspan="5">Loading logs...</td>
			</tr>
		</tbody>
	</table>

	<script>
		function fetchLogs() {
			var query = encodeURIComponent(document.getElementById('searchInput').value.trim());
			var tbody = document.getElementById('logTableBody');

			fetch('/api/log?q=' + query)
				.then(function(res) {
					if (!res.ok) throw new Error('Error loading logs');
					return res.json();
				})
				.then(function(result) {
					if (!result.data || result.data.length === 0) {
						tbody.innerHTML = '<tr><td colspan="5">No logs found.</td></tr>';
						return;
					}

					var html = '';
					for (var i = 0; i < result.data.length; i++) {
						var row = result.data[i];

						html += '<tr>' +
							'<td>' + escapeHtml(row.time_stamp || '') + '</td>' +
							'<td>' + escapeHtml(row.user || '-') + '</td>' +
							'<td>' + escapeHtml(row.rfid || '-') + '</td>' +
							'<td>' + escapeHtml(row.action || '-') + '</td>' +
							'<td>' + escapeHtml(row.source || '-') + '</td>' +
							'</tr>';
					}
					tbody.innerHTML = html;
				})
				.catch(function(err) {
					tbody.innerHTML = '<tr><td colspan="5" style="color: red;">' + err.message + '</td></tr>';
				});
		}

		function escapeHtml(str) {
			return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
		}

		fetchLogs();
	</script>

</body>
</html>
