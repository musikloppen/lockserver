<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Grant Temporary Access</title>
	<style>
	body {
		font-family: Verdana, sans-serif;
		background: #f9f9f9;
		color: #333;
		text-align: center;
		margin-top: 40px;
	}
	.card {
		background: #ffffff;
		max-width: 420px;
		margin: 0 auto;
		padding: 24px;
		border-radius: 8px;
		box-shadow: 0 2px 8px rgba(0,0,0,0.1);
	}
	h2 { margin-top: 0; color: #222; }
	.field { margin-bottom: 20px; text-align: left; }
	label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 14px; }
	input[type="text"] {
		width: 100%;
		padding: 10px;
		font-size: 16px;
		box-sizing: border-box;
		border: 1px solid #ccc;
		border-radius: 4px;
	}
	.slider-val {
		font-size: 18px;
		font-weight: bold;
		color: #0288d1;
		margin-top: 6px;
	}
	input[type="range"] { width: 100%; margin-top: 8px; }
	button {
		font-size: 18px;
		width: 100%;
		height: 46px;
		cursor: pointer;
		background-color: #2e7d32;
		color: white;
		border: none;
		border-radius: 4px;
		font-weight: bold;
	}
	button:disabled { background-color: #ccc; cursor: not-allowed; }
	#status { margin-top: 18px; font-size: 14px; font-weight: bold; }
	.success { color: #2e7d32; }
	.error   { color: #d32f2f; }
	.busy    { color: #ed6c02; }
	</style>
</head>
<body>
	<div class="card">
		<h2>Grant Temporary Access</h2>
		
		<div class="field">
			<label for="guestName">Guest Name (Optional):</label>
			<input type="text" id="guestName" placeholder="e.g. John Doe">
		</div>

		<div class="field">
			<label for="phone">Phone Number:</label>
			<input type="text" id="phone" placeholder="e.g. 12345678 or +4512345678">
		</div>

		<div class="field">
			<label for="duration">Access Duration:</label>
			<input type="range" id="duration" min="1" max="168" value="2" oninput="updateDurationLabel(this.value)">
			<div class="slider-val" id="durationLabel">2 Hours</div>
		</div>

		<button id="grantBtn" onclick="grantAccess()">Grant & Send SMS</button>
		<div id="status"></div>
	</div>

	<script>
	function updateDurationLabel(val) {
		const hours = parseInt(val, 10);
		const label = document.getElementById('durationLabel');
		if (hours < 24) {
			label.innerText = `${hours} Hour${hours > 1 ? 's' : ''}`;
		} else {
			const days = (hours / 24).toFixed(1).replace('.0', '');
			label.innerText = `${hours} Hours (~${days} Day${days !== '1' ? 's' : ''})`;
		}
	}

	async function grantAccess() {
		const name = document.getElementById('guestName').value.trim();
		const phone = document.getElementById('phone').value.trim();
		const hours = document.getElementById('duration').value;
		const btn = document.getElementById('grantBtn');
		const status = document.getElementById('status');

		if (!phone) {
			status.className = 'error';
			status.innerText = 'Please enter a valid phone number.';
			return;
		}

		btn.disabled = true;
		status.className = 'busy';
		status.innerText = 'Creating user & sending SMS...';

		try {
			const response = await fetch('/api/grant_access', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json',
					'Accept': 'application/json'
				},
				body: JSON.stringify({
					name: name,
					phone: phone,
					duration_hours: parseInt(hours, 10)
				})
			});

			let data = {};
			try { data = await response.json(); } catch(e) {}

			if (response.ok && data.status === 'ok') {
				status.className = 'success';
				status.innerHTML = `Access granted for ${data.phone} (${data.expires_in})!<br>SMS dispatched.`;
				document.getElementById('phone').value = '';
				document.getElementById('guestName').value = '';
			} else {
				status.className = 'error';
				status.innerText = data.error || `Error (${response.status})`;
			}
		} catch (err) {
			status.className = 'error';
			status.innerText = 'Network error';
		} finally {
			btn.disabled = false;
		}
	}
	</script>
</body>
</html>
