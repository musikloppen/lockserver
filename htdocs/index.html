<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>LockServer Control</title>
	<style>
	body {
		font-family: Verdana, sans-serif;
		background: #f9f9f9;
		color: #333;
		text-align: center;
		margin-top: 40px;
	}
	b {
		display: block;
		font-size: 24px;
		margin-bottom: 16px;
	}
	button {
		font-size: 20px;
		width: 140px;
		height: 44px;
		cursor: pointer;
	}
	#status {
		margin-top: 20px;
		font-size: 16px;
		font-weight: bold;
		min-height: 24px;
	}
	.success { color: #2e7d32; }  /* Green: Door Unlocked */
	.locked  { color: #555555; }  /* Dark Gray: Door Relocked */
	.error   { color: #d32f2f; }  /* Red: Error / Failed */
	.busy    { color: #ed6c02; }  /* Orange: Unlocking... */
	</style>
</head>
<body>
	<b>Door Control</b>
	<button id="unlockBtn" onclick="unlockDoor()">Unlock</button>
	<div id="status"></div>

	<script>
	let unlockTimer = null;
	let resetTimer = null;

	async function unlockDoor() {
		const btn = document.getElementById('unlockBtn');
		const status = document.getElementById('status');

		// Clear all running state timers from previous clicks
		if (unlockTimer) clearTimeout(unlockTimer);
		if (resetTimer) clearTimeout(resetTimer);

		btn.disabled = true;
		status.className = 'busy';
		status.innerText = 'Unlocking...';

		try {
			const response = await fetch('/api/unlock', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json',
					'Accept': 'application/json'
				}
			});

			let data = {};
			try {
				data = await response.json();
			} catch (e) {}

			if (response.ok && data.status === 'ok') {
				const openTimeMs = (data.open_time || 2) * 1000;

				// 1. Show Unlocked (Green)
				status.className = 'success';
				status.innerText = `Door Unlocked (${data.user})`;

				// 2. Transition to Locked (Gray) after open_time expires
				unlockTimer = setTimeout(() => {
					status.className = 'locked';
					status.innerText = 'Door Locked';
					btn.disabled = false;

					// 3. Clear message completely after 2 seconds
					resetTimer = setTimeout(() => {
						status.className = '';
						status.innerText = '';
					}, 2000);
				}, openTimeMs);

			} else {
				// Error state (Red)
				status.className = 'error';
				status.innerText = data.error || `Error (${response.status})`;
				btn.disabled = false;
			}
		} catch (err) {
			// Network error (Red)
			status.className = 'error';
			status.innerText = 'Network error';
			btn.disabled = false;
		}
	}
	</script>
</body>
</html>
